# Cloudflare Tunnel sidecar.
#
# Setup (once, in the Cloudflare Zero Trust dashboard):
#   1. Networks → Tunnels → Create a tunnel → name it "people-recognition"
#   2. Copy the tunnel token
#   3. Add a Public Hostname:
#        Subdomain : camera
#        Domain    : thesis-i.com
#        Service   : http://people-recognition.people-recognition.svc.cluster.local:8501
#   4. Encode the token and add it to k8s/secret.yaml → CLOUDFLARE_TUNNEL_TOKEN
#      then seal with kubeseal and commit k8s/sealed-secret.yaml
#
# The cloudflared pod connects outbound-only to Cloudflare — no Ingress needed.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: people-recognition
  labels:
    app: cloudflared
spec:
  replicas: 2   # two replicas for HA — Cloudflare load-balances across both
  selector:
    matchLabels:
      app: cloudflared
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532          # nonroot user in cloudflared image
        runAsGroup: 65532

      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2025.5.0
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: people-recognition-secret
                  key: CLOUDFLARE_TUNNEL_TOKEN
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

      restartPolicy: Always
