apiVersion: apps/v1
kind: Deployment
metadata:
  name: people-recognition
  namespace: people-recognition
  labels:
    app: people-recognition
spec:
  replicas: 1
  selector:
    matchLabels:
      app: people-recognition
  strategy:
    type: Recreate   # Recreate (not RollingUpdate) — single-replica app with RWO PVC
  template:
    metadata:
      labels:
        app: people-recognition
      annotations:
        checksum/secret: "update-this-on-secret-change"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000            # PVC files owned by appuser

      initContainers:
        # Ensure required data directories exist on the PVC before the app starts
        - name: init-data-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data/raw_events /data/recordings /data/snapshots /data/logs \
                         /data/.insightface /data/.ultralytics
              echo "Data dirs ready."
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: data
              mountPath: /data

      containers:
        # ── Module A + B + Admin UI ─────────────────────────────────────────
        - name: people-recognition
          # CI workflow pins this tag on every push to main
          image: ghcr.io/nulp-ai-enterprise/people-recognition:sha-a9d4f84
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
          env:
            - name: AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: people-recognition-secret
                  key: AUTH_USERNAME
            - name: AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: people-recognition-secret
                  key: AUTH_PASSWORD
            - name: RTSP_URL
              valueFrom:
                secretKeyRef:
                  name: people-recognition-secret
                  key: RTSP_URL
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "3000m"
              memory: "4Gi"     # InsightFace + YOLO need headroom
          # startupProbe gives the container time to download ML models on
          # first boot (can take 2-3 min). Only after it passes do liveness
          # and readiness probes activate.
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30   # 30 × 10s = 5 min max startup time
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            failureThreshold: 3    # restart after 60 s of no response
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp

      imagePullSecrets:
        - name: ghcr-pull-secret   # kubectl create secret docker-registry ghcr-pull-secret ...

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: people-recognition-data
        - name: tmp
          emptyDir: {}

      restartPolicy: Always
